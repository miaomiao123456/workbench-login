<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>访问验证</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body { background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm mx-auto px-6">
<div class="bg-white rounded-2xl shadow-lg p-8">
<div class="text-center mb-8">
<div class="w-14 h-14 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4">
<svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
</svg>
</div>
<h1 class="text-xl font-bold text-gray-900">北极星投研平台</h1>
<p class="text-sm text-gray-500 mt-1">请输入访问密码</p>
</div>
<form id="login-form">
<input id="password-input" type="password" placeholder="输入密码" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm">
<p id="error-msg" class="text-red-500 text-xs mt-2 hidden">密码错误，请重试</p>
<button type="submit" class="w-full mt-4 bg-indigo-600 text-white py-3 rounded-xl font-medium text-sm hover:bg-indigo-700 transition-colors">进入</button>
</form>
</div>
</div>
<script>
async function hashPassword(p){const e=new TextEncoder();const d=e.encode(p+'_northstar_salt');const h=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function checkAuth(){if(sessionStorage.getItem('northstar_auth')==='authenticated')window.location.href='content.html';}
document.getElementById('login-form').addEventListener('submit',async function(e){e.preventDefault();const input=document.getElementById('password-input').value;const inputHash=await hashPassword(input);const correctHash=await hashPassword('beijixing2026');if(inputHash===correctHash){sessionStorage.setItem('northstar_auth','authenticated');window.location.href='content.html';}else{document.getElementById('error-msg').classList.remove('hidden');document.getElementById('password-input').value='';}});
checkAuth();
</script>
</body>
</html>
